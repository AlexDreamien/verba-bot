# Fly.io deployment for the Verba bot + result collector.
#
# Runs the single long-lived process from the Dockerfile (aiogram long-polling +
# aiohttp collector on :8080 + APScheduler). The machine must stay up for the
# polling loop and the scheduler, so auto-stop is disabled and one machine is
# always kept running. SQLite lives on a persistent volume mounted at /data.
#
# Secrets (NOT in this file) — set once with:
#   flyctl secrets set BOT_TOKEN=... ADMIN_IDS=123,456

app = "verba-bot"
primary_region = "waw"   # Warsaw (close to Kyiv); change if you prefer

[build]

[env]
  TZ = "Europe/Kyiv"
  DB_PATH = "/data/verba.db"
  WEB_HOST = "0.0.0.0"
  WEB_PORT = "8080"
  WEBAPP_URL = "https://alexdreamien.github.io/verba-bot/"
  BROADCAST_CRON = "0 9 * * *"
  CLOSE_DAY_AT = "23:59"
  SUMMARY_TO_SUBSCRIBERS = "0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/healthz"

[mounts]
  source = "verba_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
